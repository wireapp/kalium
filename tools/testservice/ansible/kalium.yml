- hosts: kalium
  become: yes
  gather_facts: yes

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install base packages
      package:
        name:
          - ca-certificates
          - gnupg
          - nginx
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        daemon_reload: true
        enabled: true
        state: started

    - name: Create directory for testservice
      file:
        path: /opt/kalium-testservice/
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create logs directory writable by container
      file:
        path: /opt/kalium-testservice/logs/
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    - name: Deploy config
      copy:
        src: ../config.yml
        dest: /opt/kalium-testservice/config.yml
        owner: root
        group: root
        mode: '0644'

    - name: Deploy docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: /opt/kalium-testservice/docker-compose.yml
        owner: root
        group: root
        mode: '0644'

    - name: Start testservice
      community.docker.docker_compose_v2:
        project_src: /opt/kalium-testservice
        state: present

    - name: Deploy nginx config
      copy:
        src: kalium-testservice-nginx.conf
        dest: /etc/nginx/sites-available/kalium-testservice.conf
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload nginx

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/kalium-testservice.conf
        dest: /etc/nginx/sites-enabled/kalium-testservice.conf
        state: link
      notify:
        - Reload nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify:
        - Reload nginx

    - name: Enable and start nginx
      systemd:
        name: nginx
        enabled: true
        state: started
