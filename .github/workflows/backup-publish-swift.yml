name: Backup / Publish Swift
on:
  push:
    tags:
      - "backup/*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # required for actions/checkout and repository metadata reads

jobs:
  publish-swift:
    name: Publish Swift
    if: github.repository == 'wireapp/kalium'
    runs-on: macos-latest
    permissions:
      contents: write # required to upload backup XCFrameworks to GitHub releases
    steps:
      - uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4
        with:
          xcode-version: '16.1.0'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Fetch release tags
        run: git fetch --force --tags origin
      - name: Ensure the tag is signed
        run: git cat-file commit HEAD | grep -q -- '-----BEGIN PGP SIGNATURE-----'
      - name: Resolve logic release tag
        id: logic-release
        run: |
          logic_tag=$(git for-each-ref --sort=-v:refname --format='%(refname:strip=2)' --points-at HEAD 'refs/tags/v*' | head -n 1)
          if [ -z "$logic_tag" ]; then
            echo "::error::No logic release tag matching v* points at commit $(git rev-parse HEAD)."
            exit 1
          fi

          echo "logic_tag=$logic_tag" >> "$GITHUB_OUTPUT"
          echo "Using logic release tag: $logic_tag"

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build XCFramework
        run: ./gradlew :domain:backup:assembleBackupReleaseXCFramework

      - name: Create XCFramework Zip
        working-directory: domain/backup/build/XCFrameworks/release
        run: zip -rXq KaliumBackup.xcframework.zip KaliumBackup.xcframework

      - name: Upload XCFramework (GH Releases)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ steps.logic-release.outputs.logic_tag }}
          fail_on_unmatched_files: true
          files: |
            domain/backup/build/XCFrameworks/release/KaliumBackup.xcframework.zip
