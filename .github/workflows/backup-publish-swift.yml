name: Backup / Publish Swift
on:
  push:
    tags:
      - "backup/*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # required for actions/checkout and repository metadata reads

jobs:
  publish-swift:
    name: Publish Swift
    if: github.repository == 'wireapp/kalium'
    runs-on: macos-latest
    permissions:
      contents: write # required to upload backup XCFrameworks to GitHub releases
    steps:
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: '16.1.0'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Fetch release tags
        run: git fetch --force --tags origin
      - name: Ensure the backup tag is signed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          api_url="https://api.github.com/repos/$GITHUB_REPOSITORY"
          tag_name="$GITHUB_REF_NAME"

          ref_response=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$api_url/git/ref/tags/$tag_name")

          ref_object_type=$(echo "$ref_response" | jq -r '.object.type')
          ref_object_sha=$(echo "$ref_response" | jq -r '.object.sha')

          if [[ "$ref_object_type" != "tag" ]]; then
            echo "::error::Tag $tag_name must be an annotated signed tag."
            exit 1
          fi

          tag_response=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$api_url/git/tags/$ref_object_sha")

          verified=$(echo "$tag_response" | jq -r '.verification.verified')
          reason=$(echo "$tag_response" | jq -r '.verification.reason // "unknown"')
          target_type=$(echo "$tag_response" | jq -r '.object.type')
          target_sha=$(echo "$tag_response" | jq -r '.object.sha')
          head_sha=$(git rev-parse HEAD)

          if [[ "$target_type" != "commit" || "$target_sha" != "$head_sha" ]]; then
            echo "::error::Tag $tag_name does not point to the checked-out commit."
            exit 1
          fi

          if [[ "$verified" != "true" ]]; then
            echo "::error::Tag $tag_name signature is not verified by GitHub (reason: $reason)."
            exit 1
          fi
      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build XCFramework
        run: ./gradlew :domain:backup:assembleBackupReleaseXCFramework

      - name: Create XCFramework Zip
        working-directory: domain/backup/build/XCFrameworks/release
        run: zip -rXq KaliumBackup.xcframework.zip KaliumBackup.xcframework

      - name: Upload XCFramework (GH Releases)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            domain/backup/build/XCFrameworks/release/KaliumBackup.xcframework.zip
