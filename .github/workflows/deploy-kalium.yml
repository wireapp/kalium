name: "Deploy Kalium"

on:
  workflow_call:
    inputs:
      deployment-targets:
        description: "JSON array of deployment targets"
        required: true
        type: string
      tag-name:
        description: "Tag name for the release (e.g. v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false
      release-name:
        description: "Title for the GitHub release"
        required: false
        type: string
        default: ""
      release-body:
        description: "Body text for the GitHub release"
        required: false
        type: string
        default: ""

concurrency:
  group: deploy-kalium-${{ inputs.tag-name }}
  cancel-in-progress: true

permissions:
  contents: read # required by reusable workflow defaults
  actions: read # required to download workflow artifacts

jobs:
  deploy:
    name: Deploy
    permissions:
      contents: write # required to create/update GitHub releases
      actions: read # required to download workflow artifacts
    strategy:
      matrix:
        target: ${{ fromJson(inputs.deployment-targets) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        if: matrix.target.artifacts != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ${{ matrix.target.artifacts }}
          path: release-artifacts/
          merge-multiple: true

      - name: Deploy to GitHub Release
        if: matrix.target.type == 'github-release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ inputs.tag-name }}
          name: ${{ inputs.release-name }}
          body: ${{ inputs.release-body }}
          files: release-artifacts/*
          fail_on_unmatched_files: ${{ matrix.target.fail-on-unmatched || true }}
          prerelease: ${{ inputs.prerelease }}

  deployment-summary:
    name: Deployment Summary
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create deployment summary
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          INPUTS_DEPLOYMENT_TARGETS: ${{ inputs.deployment-targets }}
          INPUTS_TAG_NAME: ${{ inputs.tag-name }}
        run: |
          echo "## Kalium Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${INPUTS_TAG_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "**Targets**: ${INPUTS_DEPLOYMENT_TARGETS}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: $DEPLOY_RESULT" >> $GITHUB_STEP_SUMMARY
