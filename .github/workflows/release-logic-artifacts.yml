name: Release Logic Artifacts

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read # required by reusable validation/build workflows
  actions: read # required by reusable workflow metadata reads

jobs:
  validate-tag:
    name: Validate Tag
    if: github.repository == 'wireapp/kalium' && !contains(github.ref_name, '-')
    uses: ./.github/workflows/validate-release-tag.yml
    with:
      tag-name: ${{ github.ref_name }}

  build:
    name: Build
    needs: validate-tag
    permissions:
      contents: read # required for actions/checkout to read workflow sources
      actions: read # required for zizmor online audits in private repositories
      id-token: write # required for artifact provenance attestations
      attestations: write # required for artifact provenance attestations
      artifact-metadata: write # required for artifact provenance metadata
      security-events: write # required for SARIF upload
    uses: ./.github/workflows/build-kalium-unified.yml
    with:
      concurrency-group-suffix: release
      run-quality-checks: true
      build-config: |
        [
          "logic-android-aar",
          "logic-kmp"
        ]

  deploy:
    name: Deploy
    needs: build
    permissions:
      contents: write # required to create/update GitHub releases
      actions: read # required to download workflow artifacts
    uses: ./.github/workflows/deploy-kalium.yml
    with:
      tag-name: ${{ github.ref_name }}
      deployment-targets: |
        [
          {
            "type": "github-release",
            "artifacts": "logic-*",
            "fail-on-unmatched": true
          }
        ]

  publish-maven-central:
    name: Publish Maven Central
    needs: build
    permissions:
      contents: read # required for actions/checkout in the reusable workflow
    uses: ./.github/workflows/publish-maven-central.yml
    with:
      tag-name: ${{ github.ref_name }}
      publishing-type: AUTOMATIC
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
      PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
