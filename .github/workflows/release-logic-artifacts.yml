name: Release Logic Artifacts

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write
  artifact-metadata: write
  packages: write

jobs:
  validate-tag:
    if: github.repository == 'wireapp/kalium' && !contains(github.ref_name, '-')
    uses: ./.github/workflows/validate-release-tag.yml
    with:
      tag-name: ${{ github.ref_name }}
    secrets: inherit

  build:
    needs: validate-tag
    uses: ./.github/workflows/build-kalium-unified.yml
    with:
      concurrency-group-suffix: release
      run-quality-checks: true
      build-config: |
        [
          "logic-android-aar",
          "logic-kmp",
          "backup-jvm",
          "backup-web",
          "backup-swift"
        ]
    secrets: inherit

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-kalium.yml
    with:
      tag-name: ${{ github.ref_name }}
      deployment-targets: |
        [
          {
            "type": "github-release",
            "artifacts": "{logic-*,backup-*}",
            "fail-on-unmatched": true
          }
        ]

  publish-npm:
    needs: build
    if: github.repository == 'wireapp/kalium'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download backup-web artifact
        uses: actions/download-artifact@v8.0.0
        with:
          name: backup-web
          path: backup-web/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          scope: "@wireapp"

      - name: Publish to npm (OIDC Trusted Publisher)
        run: npm publish backup-web/*.tgz

  publish-maven:
    needs: build
    if: github.repository == 'wireapp/kalium'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :domain:backup:publishAllPublicationsToGitHubPackagesRepository
