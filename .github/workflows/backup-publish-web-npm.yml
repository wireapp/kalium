name: Backup / Publish Web
on:
  push:
    tags:
      - "backup/*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # required for actions/checkout and repository metadata reads

jobs:
  publish-web:
    name: Publish Web
    if: github.repository == 'wireapp/kalium'
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to upload JS package artifacts to GitHub releases
      id-token: write # required for npm trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Fetch release tags
        run: git fetch --force --tags origin
      - name: Ensure the backup tag is signed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          api_url="https://api.github.com/repos/$GITHUB_REPOSITORY"
          tag_name="$GITHUB_REF_NAME"

          ref_response=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$api_url/git/ref/tags/$tag_name")

          ref_object_type=$(echo "$ref_response" | jq -r '.object.type')
          ref_object_sha=$(echo "$ref_response" | jq -r '.object.sha')

          if [[ "$ref_object_type" != "tag" ]]; then
            echo "::error::Tag $tag_name must be an annotated signed tag."
            exit 1
          fi

          tag_response=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$api_url/git/tags/$ref_object_sha")

          verified=$(echo "$tag_response" | jq -r '.verification.verified')
          reason=$(echo "$tag_response" | jq -r '.verification.reason // "unknown"')
          target_type=$(echo "$tag_response" | jq -r '.object.type')
          target_sha=$(echo "$tag_response" | jq -r '.object.sha')
          head_sha=$(git rev-parse HEAD)

          if [[ "$target_type" != "commit" || "$target_sha" != "$head_sha" ]]; then
            echo "::error::Tag $tag_name does not point to the checked-out commit."
            exit 1
          fi

          if [[ "$verified" != "true" ]]; then
            echo "::error::Tag $tag_name signature is not verified by GitHub (reason: $reason)."
            exit 1
          fi
      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build JS/TS
        run: ./gradlew :domain:backup:jsBrowserProductionLibraryDistribution

      - name: Setup Node for npm publish (Trusted Publisher)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          package-manager-cache: false
          scope: "@wireapp"

      - name: Pack JS/TS artifact
        id: pack
        working-directory: domain/backup/build/dist/js/productionLibrary
        run: |
          package_tgz=$(npm pack | tail -n 1)
          echo "package_tgz=$package_tgz" >> "$GITHUB_OUTPUT"

      - name: Upload JS/TS package (GH Releases)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            domain/backup/build/dist/js/productionLibrary/${{ steps.pack.outputs.package_tgz }}

      - name: Publish package to npm (OIDC Trusted Publisher)
        working-directory: domain/backup/build/dist/js/productionLibrary
        run: npm publish "${STEPS_PACK_OUTPUTS_PACKAGE_TGZ}"
        env:
          STEPS_PACK_OUTPUTS_PACKAGE_TGZ: ${{ steps.pack.outputs.package_tgz }}
