name: Backup / Publish Web
on:
  push:
    tags:
      - "backup/*"

jobs:
  publish-web:
    if: github.repository == 'wireapp/kalium'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Force fetch the tag to work around actions/checkout#290
        run: git fetch -f origin ${{ github.ref }}:${{ github.ref }}
      - name: Ensure the tag is signed
        run: git cat-file commit HEAD | grep -q -- '-----BEGIN PGP SIGNATURE-----'

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build JS/TS
        run: ./gradlew :backup:jsBrowserProductionLibraryDistribution

      - name: Setup Node for npm publish (Trusted Publisher)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@wireapp"

      - name: Publish package to npm (OIDC Trusted Publisher)
        working-directory: backup/build/dist/js/productionLibrary
        env:
          # No NPM_TOKEN needed. The npm CLI will exchange the GitHub OIDC token for a one-time publish token.
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          # Publish with provenance; --access public is harmless if already published
          npm publish --provenance --access public
