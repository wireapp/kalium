name: Link and Lint PR with Jira Ticket Number

on:
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # required for actions/checkout and repository metadata reads

jobs:
  add-jira-description-merge:
    name: add-jira-description / add-jira-description
    runs-on: ubuntu-latest
    steps:
      - name: Skip Jira check on merge queue
        run: echo "Skipping Jira check on merge queue"
