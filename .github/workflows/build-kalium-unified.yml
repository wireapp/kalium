name: "Build Kalium"

on:
  workflow_call:
    inputs:
      build-config:
        description: "JSON array of build targets to execute"
        required: true
        type: string
      run-quality-checks:
        description: "Run quality gates (detekt, tests) before building"
        required: false
        type: boolean
        default: true
      concurrency-group-suffix:
        description: "Suffix for the concurrency group"
        required: true
        type: string

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: build-kalium-unified-${{ github.ref }}-${{ inputs.concurrency-group-suffix }}
  cancel-in-progress: true

jobs:
  resolve-build-config:
    runs-on: ubuntu-latest
    outputs:
      build-config: ${{ steps.resolve.outputs.build-config }}
    steps:
      - name: Resolve build config
        id: resolve
        shell: bash
        run: |
          INPUT_CONFIG='${{ inputs.build-config }}'

          if ! echo "$INPUT_CONFIG" | jq -e 'type == "array" and all(.[]; type == "string")' > /dev/null; then
            echo "::error::build-config must be a JSON array of string build targets"
            exit 1
          fi

          RESOLVED_CONFIG='[]'
          while IFS= read -r build_target; do
            case "$build_target" in
              logic-android-aar)
                BUILD_MATRIX_ENTRY='{"build-target":"logic-android-aar","platform":"android-aar","runner":"ubuntu-latest","gradle-tasks":":logic:bundleAndroidMainAar -PUSE_UNIFIED_CORE_CRYPTO=false","artifact-glob":"","xcframework-dir":"","artifact-name":"logic-android-aar","npm-pack-dir":"","zip-bundles":"[{\"name\":\"logic-android\",\"globs\":\"logic/build/outputs/aar/*.aar\"}]"}'
                ;;
              logic-kmp)
                BUILD_MATRIX_ENTRY='{"build-target":"logic-kmp","platform":"kmp","runner":"macos-15","gradle-tasks":":logic:jvmJar :logic:allMetadataJar :logic:sourcesJar :logic:assembleKaliumLogicReleaseXCFramework -PUSE_UNIFIED_CORE_CRYPTO=true","artifact-glob":"","xcframework-dir":"logic/build/XCFrameworks/release/KaliumLogic.xcframework","artifact-name":"logic-kmp","npm-pack-dir":"","zip-bundles":"[{\"name\":\"logic-jvm\",\"globs\":\"logic/build/libs/*jvm*.jar\"},{\"name\":\"logic-metadata\",\"globs\":\"logic/build/libs/*metadata*.jar logic/build/libs/*sources*.jar\"},{\"name\":\"logic-apple\",\"type\":\"xcframework\"}]"}'
                ;;
              backup-web)
                BUILD_MATRIX_ENTRY='{"build-target":"backup-web","platform":"web","runner":"ubuntu-latest","gradle-tasks":":domain:backup:jsBrowserProductionLibraryDistribution","artifact-glob":"","xcframework-dir":"","artifact-name":"backup-web","npm-pack-dir":"domain/backup/build/dist/js/productionLibrary","zip-bundles":""}'
                ;;
              backup-jvm)
                BUILD_MATRIX_ENTRY='{"build-target":"backup-jvm","platform":"jvm","runner":"ubuntu-latest","gradle-tasks":":domain:backup:jvmJar","artifact-glob":"","xcframework-dir":"","artifact-name":"backup-jvm","npm-pack-dir":"","zip-bundles":"[{\"name\":\"backup-jvm\",\"globs\":\"domain/backup/build/libs/*jvm*.jar\"}]"}'
                ;;
              backup-swift)
                BUILD_MATRIX_ENTRY='{"build-target":"backup-swift","platform":"apple","runner":"macos-15","gradle-tasks":":domain:backup:assembleBackupReleaseXCFramework","artifact-glob":"","xcframework-dir":"domain/backup/build/XCFrameworks/release/KaliumBackup.xcframework","artifact-name":"backup-swift","npm-pack-dir":"","zip-bundles":""}'
                ;;
              *)
                echo "::error::Unsupported build target: $build_target"
                exit 1
                ;;
            esac

            RESOLVED_CONFIG=$(jq -c --argjson entry "$BUILD_MATRIX_ENTRY" '. + [$entry]' <<< "$RESOLVED_CONFIG")
          done < <(echo "$INPUT_CONFIG" | jq -r '.[]')

          echo "build-config=$RESOLVED_CONFIG" >> "$GITHUB_OUTPUT"

  # ── Quality Gates ──────────────────────────────────────────────
  detekt:
    if: inputs.run-quality-checks
    uses: ./.github/workflows/codestyle.yml

  jvm-tests:
    if: inputs.run-quality-checks
    needs: [detekt]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Run JVM tests
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew jvmTest -Djava.library.path=./native/libs

  android-tests:
    if: inputs.run-quality-checks
    needs: [detekt]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          enable-kvm: true

      - name: Run Android unit tests
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew testAndroidHostTest

  android-connected-tests:
    if: inputs.run-quality-checks
    needs: [detekt]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [31]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free Disk Space Before Build
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          echo "Disk space after cleanup:"
          df -h

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build the samples
        run: |
          ./gradlew :sample:samples:compileAndroidDeviceTestSources

      - name: Get AVD info
        uses: ./.github/actions/get-avd-info
        id: avd-info
        with:
          api-level: ${{ matrix.api-level }}

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2.35.0
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ steps.avd-info.outputs.arch }}
          target: ${{ steps.avd-info.outputs.target }}
          cores: 4
          ram-size: 4096M
          heap-size: 2048M
          disable-animations: true
          script: ./gradlew connectedAndroidDeviceTest

  ios-tests:
    if: inputs.run-quality-checks
    needs: [detekt]
    runs-on: macos-15
    steps:
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1.0"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Run logic iOS simulator tests
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew iosSimulatorArm64Test -PUSE_UNIFIED_CORE_CRYPTO=true

  # ── Build Matrix ───────────────────────────────────────────────
  build:
    name: "Build ${{ matrix.platform }}"
    needs: [resolve-build-config, jvm-tests, android-tests, android-connected-tests, ios-tests]
    # When quality checks are skipped, run immediately
    if: |
      always() &&
      needs.resolve-build-config.result == 'success' &&
      (inputs.run-quality-checks == false || (needs.jvm-tests.result == 'success' && needs.android-tests.result == 'success' && needs.android-connected-tests.result == 'success' && needs.ios-tests.result == 'success'))
    runs-on: ${{ matrix.runner || (matrix.platform == 'ios' && 'macos-15' || 'ubuntu-latest') }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-build-config.outputs.build-config) }}
    steps:
      - name: Setup Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1.0"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build artifacts
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew ${{ matrix.gradle-tasks }}

      - name: Setup Node.js
        if: matrix.npm-pack-dir != ''
        uses: actions/setup-node@v6
        with:
          scope: "@wireapp"

      - name: Post-build — npm pack
        if: matrix.npm-pack-dir != ''
        run: |
          mkdir -p release/${{ matrix.artifact-name }}
          cd "${{ matrix.npm-pack-dir }}"
          package_tgz=$(npm pack | tail -n 1)
          cp "$package_tgz" "$GITHUB_WORKSPACE/release/${{ matrix.artifact-name }}/"

      - name: Post-build — collect file artifacts
        if: matrix.artifact-glob != '' && matrix.zip-bundles == ''
        run: |
          mkdir -p release/${{ matrix.artifact-name }}
          IFS=' ' read -ra GLOBS <<< "${{ matrix.artifact-glob }}"
          for glob in "${GLOBS[@]}"; do
            dir=$(dirname "$glob")
            pattern=$(basename "$glob")
            find "$dir" -maxdepth 1 -name "$pattern" -exec cp {} release/${{ matrix.artifact-name }}/ \;
          done
          test -n "$(ls -A release/${{ matrix.artifact-name }})"

      - name: Post-build — zip XCFramework
        if: matrix.xcframework-dir != '' && matrix.zip-bundles == ''
        run: |
          XCFRAMEWORK_DIR="${{ matrix.xcframework-dir }}"
          if [ ! -d "$XCFRAMEWORK_DIR" ]; then
            echo "::error::XCFramework not found at $XCFRAMEWORK_DIR"
            exit 1
          fi
          mkdir -p release/${{ matrix.artifact-name }}
          PARENT_DIR=$(dirname "$XCFRAMEWORK_DIR")
          FRAMEWORK_NAME=$(basename "$XCFRAMEWORK_DIR")
          (cd "$PARENT_DIR" && zip -rXq "${FRAMEWORK_NAME}.zip" "$FRAMEWORK_NAME")
          mv "${PARENT_DIR}/${FRAMEWORK_NAME}.zip" release/${{ matrix.artifact-name }}/

      - name: Post-build — create per-target zip bundles
        if: matrix.zip-bundles != ''
        run: |
          mkdir -p release/${{ matrix.artifact-name }}
          BUNDLES='${{ matrix.zip-bundles }}'
          echo "$BUNDLES" | jq -c '.[]' | while IFS= read -r bundle; do
            name=$(echo "$bundle" | jq -r '.name')
            type=$(echo "$bundle" | jq -r '.type // ""')
            globs=$(echo "$bundle" | jq -r '.globs // ""')

            if [ "$type" = "xcframework" ]; then
              XCFRAMEWORK_DIR="${{ matrix.xcframework-dir }}"
              if [ ! -d "$XCFRAMEWORK_DIR" ]; then
                echo "::error::XCFramework not found at $XCFRAMEWORK_DIR"
                exit 1
              fi
              PARENT_DIR=$(dirname "$XCFRAMEWORK_DIR")
              FRAMEWORK_NAME=$(basename "$XCFRAMEWORK_DIR")
              (cd "$PARENT_DIR" && zip -rXq "${name}.zip" "$FRAMEWORK_NAME")
              mv "${PARENT_DIR}/${name}.zip" release/${{ matrix.artifact-name }}/
            else
              tmpdir=$(mktemp -d)
              IFS=' ' read -ra GLOB_ARRAY <<< "$globs"
              for glob in "${GLOB_ARRAY[@]}"; do
                dir=$(dirname "$glob")
                pattern=$(basename "$glob")
                find "$dir" -maxdepth 1 -name "$pattern" -exec cp {} "$tmpdir/" \;
              done
              if [ -z "$(ls -A "$tmpdir")" ]; then
                echo "::error::No files found for bundle $name (globs: $globs)"
                exit 1
              fi
              (cd "$tmpdir" && zip -rXq "${name}.zip" .)
              mv "$tmpdir/${name}.zip" release/${{ matrix.artifact-name }}/
              rm -rf "$tmpdir"
            fi
          done

      - name: Post-build — generate checksums
        if: matrix.artifact-name != ''
        run: |
          ARTIFACT_DIR="release/${{ matrix.artifact-name }}"
          CHECKSUM_FILE="${{ matrix.artifact-name }}-SHA256SUMS.txt"

          (
            cd "$ARTIFACT_DIR"
            shopt -s nullglob
            files=(./*)
            filtered=()

            for file in "${files[@]}"; do
              base_name=$(basename "$file")
              if [ -f "$file" ] && [ "$base_name" != "$CHECKSUM_FILE" ]; then
                filtered+=("$file")
              fi
            done

            if [ "${#filtered[@]}" -eq 0 ]; then
              echo "::error::No artifacts found to checksum in $ARTIFACT_DIR"
              exit 1
            fi

            shasum -a 256 "${filtered[@]}" | sed 's#  \./#  #' > "$CHECKSUM_FILE"
          )

          test -s "$ARTIFACT_DIR/$CHECKSUM_FILE"

      - name: Post-build — attest release artifacts
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: release/${{ matrix.artifact-name }}/${{ matrix.artifact-name }}-SHA256SUMS.txt

      - name: Post-build — persist attestation bundle
        if: steps.attest.outputs.bundle-path != ''
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" \
            "release/${{ matrix.artifact-name }}/${{ matrix.artifact-name }}-provenance-bundle.json"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: release/${{ matrix.artifact-name }}/*
          retention-days: 3

      - name: Build summary
        run: |
          echo "## Build Summary — ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact**: ${{ matrix.artifact-name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Gradle tasks**: \`${{ matrix.gradle-tasks }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Checksums**: \`${{ matrix.artifact-name }}-SHA256SUMS.txt\`" >> $GITHUB_STEP_SUMMARY
          echo "**Attestation**: ${{ steps.attest.outputs.attestation-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Generated files**:" >> $GITHUB_STEP_SUMMARY
          ls release/${{ matrix.artifact-name }}/ | while read file; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done
