name: Deploy ADR Docs

on:
  push:
    branches: [ 'develop' ]
  pull_request:
    types: [ opened, synchronize ]
    paths: [ 'docs/adr/**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install pip for adr-viewer
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install adr-viewer

      - name: Generate ADR docs
        run: |
          adr-viewer --adr-path docs/adr --output docs/adr/index.html

      - name: Deploy ADRs 🚀
        if: github.event_name == 'push' && github.ref_name == 'develop'
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/adr
          publish_branch: gh-pages
          destination_dir: docs/adr
          keep_files: true

      - name: Comment new ADR(s) in PR
        if: github.event.pull_request.head.repo.full_name == github.repository && github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "# New ADR(s) in this PR 📚:" > /tmp/new-adr
          gh pr diff "$PR_NUMBER" --name-only | grep docs/adr | xargs cat >> /tmp/new-adr
          gh pr comment "$PR_NUMBER" -F /tmp/new-adr --edit-last || gh pr comment "$PR_NUMBER" -F /tmp/new-adr
