name: "Kotlin ABI"

on:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - 'develop'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read # required for actions/checkout and repository metadata reads

jobs:
  check-kotlin-abi:
    name: Check Kotlin ABI
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Check Kotlin ABI
        run: ./gradlew :logic:checkKotlinAbi -PUSE_UNIFIED_CORE_CRYPTO=true
