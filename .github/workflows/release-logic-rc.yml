name: Release Logic Artifacts (RC)

on:
  push:
    tags:
      - "v*-rc*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read # required by reusable validation/build workflows
  actions: read # required by reusable workflow metadata reads

jobs:
  validate-tag:
    name: Validate Tag
    if: github.repository == 'wireapp/kalium'
    uses: ./.github/workflows/validate-release-tag.yml
    with:
      tag-name: ${{ github.ref_name }}

  build:
    name: Build
    needs: validate-tag
    permissions:
      contents: read # required for actions/checkout to read workflow sources
      actions: read # required for zizmor online audits in private repositories
      id-token: write # required for artifact provenance attestations
      attestations: write # required for artifact provenance attestations
      artifact-metadata: write # required for artifact provenance metadata
      security-events: write # required for SARIF upload
    uses: ./.github/workflows/build-kalium-unified.yml
    with:
      concurrency-group-suffix: release-rc
      run-quality-checks: true
      build-config: |
        [
          "logic-android-aar",
          "logic-kmp"
        ]

  deploy:
    name: Deploy
    needs: build
    permissions:
      contents: write # required to create/update GitHub releases
      actions: read # required to download workflow artifacts
    uses: ./.github/workflows/deploy-kalium.yml
    with:
      tag-name: ${{ github.ref_name }}
      prerelease: true
      release-name: "Release Candidate ${{ github.ref_name }}"
      release-body: |
        ## Release Candidate for ${{ github.ref_name }}

        This is a **pre-release** for testing purposes.

        **Note**: This is not a final release. Use for testing only.
      deployment-targets: |
        [
          {
            "type": "github-release",
            "artifacts": "logic-*",
            "fail-on-unmatched": true
          }
        ]
