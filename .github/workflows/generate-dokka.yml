name: Deploy Dokka docs

on:
  push:
    branches:
      - develop # later on we should stick to main, since there will be the releases
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # required for pushing to gh-pages branch

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Generate Dokka docs
        run: make doc/generate-kdocs
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy kdocs 🚀
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/htmlMultiModule
          publish_branch: gh-pages
          destination_dir: docs/kdocs
          keep_files: true
