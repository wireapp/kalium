---
# All audits run with defaults; only configurable audits are overridden below.
# Persona, severity floor, and confidence floor are set in .github/workflows/build-kalium-unified.yml.
rules:
  unpinned-uses:
    config:
      policies:
        '*': hash-pin

  secrets-outside-env:
    config:
      allow: []

  superfluous-actions:
    ignore:
      - backup-publish-swift.yml
      - backup-publish-web-npm.yml
      - deploy-kalium.yml
      - generate-changelog.yml
