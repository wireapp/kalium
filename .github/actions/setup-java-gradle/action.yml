name: Setup Java and Gradle
description: Setup java and gradle with cache for jobs
inputs:
  enable-kvm:
    description: 'Whether to enable KVM'
    required: false
    default: false
runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle Cache
      uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@6cfc8b8e8bb586cc164bef1c478c1eea3a4d6a19

    - name: Enable KVM (Linux only)
      if: ${{ inputs.enable-kvm == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
