# Manual license overrides for Maven coordinates AND npm packages.
# These entries are the AUTHORITATIVE source — the POM parser
# (scripts/parse-pom-licenses.py) and the notice generator
# (scripts/generate-third-party-notice.py) both check this table FIRST and
# only fall back to upstream-declared metadata when no override matches.
#
# Use this to:
#   - Pin a canonical name/URL for packages whose declared license uses
#     inconsistent wording (The Apache Software License, Version 2.0 vs Apache-2.0).
#   - Disambiguate dual-licensed projects when Kalium ships under one option.
#   - Cover packages that declare no license at all (the original trigger —
#     SLF4J, Guava's listenablefuture stubs, the ICU4J npm port, etc.).
#   - Attach a free-form `notes` paragraph that renders in the customer
#     THIRD-PARTY-NOTICE.md between the metadata block and the bundled
#     license text. Use for caveats, attribution requirements, or
#     compliance call-outs that don't fit the structured fields.
#
# Schema (top-level list of override entries):
#   - groupId:       Maven groupId, or the literal string `npm` for npm packages.
#                    Each entry covers ALL versions of <groupId>:<artifactId>.
#                    Maven and npm rows live in disjoint key spaces
#                    (`gid:aid` never collides) so this file can host both.
#     artifactId:    Maven artifactId, or npm package name (`icu4j`,
#                    `@scope/pkg`).
#     license_names: Pipe-separated license names ("A | B") for the same
#                    multi-license form used by POM <licenses>.
#     license_urls:  Pipe-separated URLs aligned with license_names.
#     notes:         (optional) Free-form text. When non-empty, the notice
#                    generator emits it in the component's section in
#                    THIRD-PARTY-NOTICE.md, after the metadata bullets and
#                    before the bundled or canonical license text.
#     license_text:  (optional) Verbatim license body. When non-empty, the
#                    notice generator emits it inside a collapsible
#                    `<details>` block in the component's section — the
#                    same shape used for LICENSE files unpacked from the
#                    artifact's distribution. Use for packages that ship
#                    no LICENSE file and where pasting the upstream text
#                    inline is more useful than relying on the appendix
#                    cross-reference. Multi-line YAML literals (`|`)
#                    preserve formatting.
#
# Rows emitted from this file land in scan-pom-licenses.tsv (Maven side)
# or the npm sections of THIRD-PARTY-NOTICE.md (npm side) with the `source`
# field set to `override` so downstream consumers can audit provenance per
# package.
#
# How to update: when build/sbom/scan-pom-no-licenses.txt grows, when the
# upstream-declared metadata for a known package is wrong, or when an npm
# section in THIRD-PARTY-NOTICE.md shows Verify manually, verify the
# license against the upstream project's documentation (LICENSE file in
# the repo, project website, etc.) and add an entry here.

